name: Test

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - run: go test -race ./...

      - name: Fuzz
        run: |
          for pkg in . ./ocf; do
            for fn in $(go test -list '^Fuzz' "$pkg" 2>/dev/null | grep '^Fuzz'); do
              go test -run='^$' -fuzz="^${fn}$" -fuzztime=10s "$pkg" &
            done
          done
          wait
