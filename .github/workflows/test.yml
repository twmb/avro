name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - run: go test -race ./...

      - name: Fuzz
        run: |
          go test -run='^$' -fuzz=FuzzParse -fuzztime=10s &
          go test -run='^$' -fuzz='^FuzzDecode$' -fuzztime=10s &
          go test -run='^$' -fuzz=FuzzDecodeEncodeRoundTrip -fuzztime=10s &
          go test -run='^$' -fuzz=FuzzResolve -fuzztime=10s &
          (cd ocf && go test -run='^$' -fuzz=FuzzOCFReader -fuzztime=10s) &
          wait
